name: Update momentum backtest results

on:
  workflow_dispatch:
  schedule:
    # Weekly update, Sunday 08:00 UTC.
    - cron: "0 8 * * 0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest pipeline
        run: python run_all.py

      - name: Commit updated data and results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update monthly point-in-time momentum results
          file_pattern: "data/*.csv output/*.csv README.md"
